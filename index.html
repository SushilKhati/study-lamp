<!DOCTYPE html>
<html>
<head>
    <title>Simple Dashboard</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        table {
            border-collapse: collapse;
            width: 60%;
        }
        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        button {
            margin-bottom: 10px;
            padding: 8px 12px;
        }
    </style>
</head>
<body>

<h2>Product Table</h2>

<button onclick="loadData()">Load Data</button>

<table id="table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
function loadData() {
    // Dummy data (later replace with API response)
    const data = [
        {id: 1, name: "Laptop", price: 50000},
        {id: 2, name: "Phone", price: 20000},
        {id: 3, name: "Tablet", price: 15000}
    ];

    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    data.forEach(item => {
        const row = `<tr>
            <td>${item.id}</td>
            <td>${item.name}</td>
            <td>${item.price}</td>
        </tr>`;
        tbody.innerHTML += row;
    });
}
</script>

</body>
</html>
