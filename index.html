<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h2>Product Dashboard</h2>

<button onclick="loadProducts()">Load Products</button>
<button onclick="triggerBot()">Trigger Bot</button>

<table border="1" id="table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
const API_BASE = "https://your-fastapi-app.azurewebsites.net";

function loadProducts() {
    fetch(`${API_BASE}/products`)
        .then(res => res.json())
        .then(data => {
            const tbody = document.querySelector("#table tbody");
            tbody.innerHTML = "";

            data.forEach(item => {
                const row = `<tr>
                    <td>${item.id}</td>
                    <td>${item.name}</td>
                    <td>${item.price}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        });
}

function triggerBot() {
    fetch(`${API_BASE}/trigger-bot`, {
        method: "POST"
    })
    .then(res => res.json())
    .then(data => alert(data.status));
}
</script>

</body>
</html>
