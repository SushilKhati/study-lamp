<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FastAPI Data Viewer</title>
</head>
<body>

<h2>User Data</h2>

<button onclick="loadData()">Display Data</button>
<button onclick="triggerBot()">Trigger Bot</button>

<table border="1" id="dataTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Password</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
    // ✅ Base URL (change this once when deploying)
    const BASE_URL = "https://learningfastapi-h8mj.onrender.com";

    async function loadData() {
        try {
            const response = await fetch(`${BASE_URL}/seller/`);
            const data = await response.json();

            const tableBody = document.querySelector("#dataTable tbody");
            tableBody.innerHTML = "";

            data.forEach(user => {
                tableBody.innerHTML += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.password}</td>
                    </tr>
                `;
            });

        } catch (error) {
            console.error(error);
        }
    }

    async function triggerBot() {
        try {
            const response = await fetch(`${BASE_URL}/bot`);
            const result = await response.json();

            alert(result.message);

        } catch (error) {
            console.error(error);
        }
    }
</script>

</body>
</html>
